<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Accessibility Checker</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .card {
            border-radius: 15px;
        }
        .btn-primary {
            width: 100%;
        }
        .status-text {
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow p-4" style="width: 400px;">

        <h3 class="text-center mb-3">📄 PDF Accessibility Checker</h3>
        <p class="text-center text-muted">Upload PDF or ZIP to validate accessibility</p>

        <!-- File Input -->
        <div class="mb-3">
            <input type="file" id="fileInput" multiple class="form-control" />
        </div>

        <!-- Upload Button -->
        <button class="btn btn-primary" onclick="uploadFile()">Upload & Process</button>

        <!-- Status -->
        <p id="status" class="text-center status-text text-muted"></p>

        <hr>

        <!-- Download Section -->
        <div class="text-center">
            <button class="btn btn-success" onclick="downloadCSV()">Download Latest CSV Report</button>
        </div>

    </div>
</div>

<script>
    async function uploadFile() {
    const files = document.getElementById("fileInput").files;

    if (files.length === 0) {
        alert("Please select at least one file");
        return;
    }

    for (let file of files) {
         if (!file || !file.name) {
            console.error("Invalid file detected:", file);
            continue; // skip this file
        }
        try {
            console.log("Uploading:", file.name);

            // Step 1: Get presigned URL
            const response = await fetch("https://9xsnwwgaqj.execute-api.ap-south-1.amazonaws.com/dev/get-upload-url", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ filename: file.name })
            });

             if (!response.ok) {
                console.error("API failed for:", file.name);
                continue;
            }

            const data = await response.json();
            const uploadUrl = data.uploadUrl;

            // Step 2: Upload file to S3
            await fetch(uploadUrl, {
                method: "PUT",
                headers: {
                   "Content-Type": file.type || "application/pdf"
                },
                body: file
            });

            console.log("Uploaded:", file.name);

        } catch (error) {
            console.error("Error uploading", file.name, error);
        }
    }

    alert("All files uploaded successfully!");
}

   async function downloadCSV() {
        try {
        const response = await fetch("https://fq3dja3f35.execute-api.ap-south-1.amazonaws.com/dev/download-report");
        const blob = await response.blob();

    const url = window.URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "report.csv";
    a.click();

    } catch (error) {
        console.error("Download failed", error);
    }
    }
</script>

</body>
</html>
